server:
  port: 8080

spring:
  application:
    name: errorquest-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/errorquest?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

jwt:
  secret: errorquest-secret-key-2024
  expiration: 86400000

# AI模型配置
ai:
  # 默认AI提供商: mock(模拟)/zhipu(智谱)/deepseek
  # 已配置真实AI模型，默认使用智谱AI
  default-provider: ${AI_DEFAULT_PROVIDER:zhipu}
  
  # 智谱AI配置 (GLM-4-Flash 完全免费)
  # 申请地址: https://open.bigmodel.cn
  # ZHIPU_API_KEY: 3963a62b0b0746d7ac0114db00990e34.1J7nNZDjK2mF0H07
  zhipu:
    api-key: ${ZHIPU_API_KEY:3963a62b0b0746d7ac0114db00990e34.1J7nNZDjK2mF0H07}
    model: ${ZHIPU_MODEL:glm-4-flash}
    base-url: https://open.bigmodel.cn/api/paas/v4
  
  # DeepSeek配置 (5000万tokens/月免费)
  # 申请地址: https://platform.deepseek.com
  # DEEPSEEK_API_KEY: sk-608be6e426354f2faaba757740d12df8
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:sk-608be6e426354f2faaba757740d12df8}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    base-url: https://api.deepseek.com

logging:
  level:
    com.errorquest: debug
